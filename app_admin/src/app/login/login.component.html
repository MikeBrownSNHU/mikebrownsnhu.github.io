<!-- Login form - enhanced with loading state and better accessibility -->
<div class="row">
  <div class="col-12 col-md-8">
    <h2>Login</h2>
    <form (ngSubmit)="onLoginSubmit()">
      <div role="alert" *ngIf="formError" class="alert alert-danger">
        {{ formError }}
      </div>
      <div *ngIf="isLoading" class="alert alert-info">
        Signing in...
      </div>
      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" class="form-control" id="name" name="name"
          placeholder="Enter Name" [(ngModel)]="credentials.name"
          [disabled]="isLoading">
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email"
          placeholder="Enter email address" [(ngModel)]="credentials.email"
          [disabled]="isLoading">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password"
          name="password" placeholder="e.g 12+ alphanumerics"
          [(ngModel)]="credentials.password" [disabled]="isLoading">
      </div>
      <button type="submit" role="button" class="btn btn-primary"
        [disabled]="isLoading">
        {{ isLoading ? 'Signing In...' : 'Sign In!' }}
      </button>
    </form>
  </div>
</div>
